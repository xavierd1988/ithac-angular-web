<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#030303">
  <title>Ithac Live Scraper</title>
  <link rel="icon" href="./favicon.ico?v=20260705-multi-horizon" sizes="any">
  <link rel="shortcut icon" href="./favicon.ico?v=20260705-multi-horizon">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=20260705-multi-horizon">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=20260705-multi-horizon">
  <link rel="mask-icon" href="./safari-pinned-tab.svg?v=20260705-multi-horizon" color="#c9972b">
  <link rel="stylesheet" href="./styles.css?v=20260705-multi-horizon">
</head>
<body>
  <button id="menuToggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="controlPopover">
    <span>Menu</span>
    <em id="menuSummary">loading</em>
  </button>
  <div id="menuBackdrop" class="menu-backdrop" hidden></div>
  <aside id="controlPopover" class="control-popover" hidden>
    <header class="topbar">
      <div>
        <span class="eyebrow">Ithac scraper</span>
        <h1>Control</h1>
      </div>
      <button id="menuClose" class="menu-close" type="button" aria-label="Close menu">Close</button>
    </header>

    <section class="menu-stats" aria-label="Visible list state">
      <span id="listRange">0 visible · 0 handles</span>
      <span id="listStats">0 complete · 0 failed</span>
    </section>

    <section class="menu-grid">
      <section class="run-strip" aria-label="Live scraper state">
        <div class="run-pill" id="runPill">
          <i></i>
          <strong id="runState">loading</strong>
          <span id="runProgress">0/0</span>
        </div>
        <div class="position-card">
          <span>Scanner position</span>
          <strong id="scannerTitle">connecting</strong>
          <em id="scannerMeta">waiting for live data</em>
        </div>
      </section>

      <section class="loop-monitor" id="loopMonitor">
        <strong id="loopTitle">Loading live loop</strong>
        <span id="loopMeta">Connecting to backend...</span>
      </section>
    </section>

    <section class="toolbar">
      <form id="addForm" class="add-form">
        <input id="handleInput" autocomplete="off" spellcheck="false" placeholder="@handle">
        <button type="submit">Add</button>
      </form>
      <input id="searchInput" class="search" autocomplete="off" spellcheck="false" placeholder="Search">
      <button id="scrapeButton" class="scrape-button" type="button">Scrape 40</button>
    </section>
  </aside>

  <main class="app-shell">
    <section class="list-card">
      <nav class="main-tabs" aria-label="Scraper views">
        <button class="active" type="button" data-tab="live">Live</button>
        <button type="button" data-tab="timex">TIMEX</button>
        <button type="button" data-tab="reputation">Reputation</button>
      </nav>
      <nav class="pager" aria-label="Influencer pages">
        <button id="prevPage" type="button">Previous</button>
        <strong id="pageStatus">Page 1 / 1</strong>
        <div class="page-numbers" id="pageNumbers"></div>
        <button id="nextPage" type="button">Next</button>
        <label>
          Rows
          <select id="pageSize">
            <option value="100">100</option>
            <option value="250" selected>250</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
          </select>
        </label>
      </nav>

      <div id="loadError" class="load-error" hidden></div>
      <div id="list" class="list" aria-live="polite"></div>
    </section>
  </main>
  <div id="modalRoot"></div>

  <script src="./app.js?v=20260705-multi-horizon" defer></script>
</body>
</html>
