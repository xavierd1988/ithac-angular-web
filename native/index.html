<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#030303">
  <title>Ithac Live Scraper</title>
  <link rel="icon" href="./favicon.ico?v=20260707-paper" sizes="any">
  <link rel="shortcut icon" href="./favicon.ico?v=20260707-paper">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=20260707-paper">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=20260707-paper">
  <link rel="mask-icon" href="./safari-pinned-tab.svg?v=20260707-paper" color="#c9972b">
  <link rel="stylesheet" href="./styles.css?v=20260709-merged-ranking-nullsafe">
</head>
<body>
  <main class="app-shell">
    <header id="livePositionBar" class="live-position-bar" aria-label="Live scraper position">
      <span class="live-dot"></span>
      <span class="live-kicker">Live position</span>
      <strong id="scannerTitle">connecting</strong>
      <em id="scannerMeta">waiting for live data</em>
    </header>

    <section class="list-card">
      <nav class="main-tabs" aria-label="Scraper views">
        <button class="active" type="button" data-tab="live">Live ranking</button>
        <button type="button" data-tab="paper">Paper</button>
      </nav>
      <nav class="pager" aria-label="Influencer pages">
        <button id="prevPage" type="button">Previous</button>
        <strong id="pageStatus">Page 1 / 1</strong>
        <div class="page-numbers" id="pageNumbers"></div>
        <button id="nextPage" type="button">Next</button>
        <label>
          Rows
          <select id="pageSize">
            <option value="100">100</option>
            <option value="250" selected>250</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
          </select>
        </label>
      </nav>

      <div id="loadError" class="load-error" hidden></div>
      <div id="list" class="list" aria-live="polite"></div>
    </section>
  </main>
  <div id="modalRoot"></div>

  <script src="./app.js?v=20260709-merged-ranking-nullsafe" defer></script>
</body>
</html>
